name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, sqlite, pdo_sqlite, gd
          coverage: none

      - name: Install PHP dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Prepare Laravel
        run: |
          cp .env.example .env
          php artisan key:generate --force
          php artisan optimize:clear
        env:
          APP_ENV: testing
          APP_DEBUG: "false"
          APP_URL: http://localhost

      - name: Run tests
        run: |
          php artisan route:list --path=api
          php artisan test
        env:
          APP_ENV: testing
          APP_DEBUG: "false"
          APP_URL: http://localhost
